<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper2Digital - 종이 유인물 디지털 변환기</title>
    <!-- Tailwind CSS 4 Standalone -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <!-- Libraries via ESM Map -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom": "https://esm.sh/react-dom@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "@google/generative-ai": "https://esm.sh/@google/generative-ai@0.1.1",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0",
            "framer-motion": "https://esm.sh/framer-motion@11.0.8",
            "jspdf": "https://esm.sh/jspdf@2.5.1",
            "html2canvas": "https://esm.sh/html2canvas@1.4.1"
        }
    }
    </script>

    <script type="module">
        import React, { useState, useRef, useCallback, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { GoogleGenerativeAI } from "@google/generative-ai";
        import { 
            Upload, FileText, Download, RefreshCw, 
            AlertCircle, BookOpen, Camera, Layers, Settings, CheckCircle
        } from 'lucide-react';
        import { motion, AnimatePresence } from 'framer-motion';
        import jsPDF from 'jspdf';
        import html2canvas from 'html2canvas';

        function App() {
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [showSettings, setShowSettings] = useState(!apiKey);
            const [image, setImage] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);
            const resultRef = useRef(null);
            const fileInputRef = useRef(null);

            const saveApiKey = (e) => {
                e.preventDefault();
                localStorage.setItem('gemini_api_key', apiKey);
                setShowSettings(false);
                setError(null);
            };

            const handleImageUpload = (e) => {
                const file = e.target.files?.[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setImage(event.target.result);
                        setResult(null);
                        setError(null);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const analyzeImage = async () => {
                if (!apiKey) {
                    setShowSettings(true);
                    return;
                }
                setIsAnalyzing(true);
                setError(null);

                try {
                    const genAI = new GoogleGenerativeAI(apiKey);
                    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                    
                    const base64Data = image.split(',')[1];
                    const prompt = "이 이미지는 고등학생의 수업 유인물입니다. 1. 모든 텍스트를 고화질 OCR하듯이 추출해주세요. 2. 핵심 내용을 요약해주세요. 3. 제목을 정해주세요. 형식: [TITLE]:제목 [SUMMARY]:요약 [ORIGINAL]:원문";

                    const result = await model.generateContent([
                        prompt,
                        { inlineData: { data: base64Data, mimeType: "image/jpeg" } }
                    ]);
                    const text = result.response.text();
                    
                    const titleMatch = text.match(/\[TITLE\]:(.*?)(\n|$)/i);
                    const summaryMatch = text.match(/\[SUMMARY\]:([\s\S]*?)(\[ORIGINAL\]|$)/i);
                    const originalMatch = text.match(/\[ORIGINAL\]:([\s\S]*)/i);

                    setResult({
                        title: titleMatch ? titleMatch[1].trim() : "분석된 학습 자료",
                        summary: summaryMatch ? summaryMatch[1].trim() : "요약을 구성하는 데 실패했습니다.",
                        originalText: originalMatch ? originalMatch[1].trim() : "원문을 추출하는 데 실패했습니다."
                    });
                } catch (err) {
                    console.error(err);
                    setError("분석 중 오류가 발생했습니다. API 키를 확인하거나 다시 시도해주세요.");
                } finally {
                    setIsAnalyzing(false);
                }
            };

            const downloadPDF = async () => {
                if (!resultRef.current) return;
                try {
                    const canvas = await html2canvas(resultRef.current, { scale: 2 });
                    const imgData = canvas.toDataURL('image/png');
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const imgWidth = 190;
                    const imgHeight = (canvas.height * imgWidth) / canvas.width;
                    pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
                    pdf.save(`${result?.title}.pdf`);
                } catch (err) {
                    setError("PDF 저장 실패.");
                }
            };

            return (
                <div className="min-h-screen bg-[#F8FAFC] text-slate-800 flex flex-col">
                    {/* Header */}
                    <header className="h-16 bg-white border-b border-slate-200 px-8 flex items-center justify-between sticky top-0 z-20">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white">
                                <BookOpen size={20} />
                            </div>
                            <h1 className="text-xl font-bold text-slate-900 tracking-tight">Paper2Digital</h1>
                        </div>
                        <button 
                            onClick={() => setShowSettings(true)}
                            className="p-2 hover:bg-slate-50 rounded-lg text-slate-500 transition-colors"
                        >
                            <Settings size={20} />
                        </button>
                    </header>

                    {/* API Key Modal */}
                    <AnimatePresence>
                        {showSettings && (
                            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                                <motion.div 
                                    initial={{ scale: 0.9, opacity: 0 }}
                                    animate={{ scale: 1, opacity: 1 }}
                                    className="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl overflow-hidden"
                                >
                                    <h2 className="text-xl font-bold mb-4">Gemini API 설정</h2>
                                    <p className="text-sm text-slate-500 mb-6 leading-relaxed">
                                        이 앱은 클라이언트 측에서 직접 Gemini AI를 사용합니다. <br/>
                                        <a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-blue-600 underline">여기</a>에서 무료 API 키를 발급받아 입력하세요.
                                    </p>
                                    <form onSubmit={saveApiKey} className="space-y-4">
                                        <input 
                                            type="password" 
                                            value={apiKey}
                                            onChange={(e) => setApiKey(e.target.value)}
                                            placeholder="키를 여기에 붙여넣으세요"
                                            className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none"
                                            required
                                        />
                                        <div className="flex gap-2">
                                            <button type="submit" className="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">저장</button>
                                            <button onClick={() => setShowSettings(false)} className="px-4 bg-slate-100 rounded-xl font-bold">닫기</button>
                                        </div>
                                    </form>
                                </motion.div>
                            </div>
                        )}
                    </AnimatePresence>

                    <main className="flex-1 max-w-[1200px] w-full mx-auto p-6 gap-6 flex flex-col lg:flex-row">
                        {/* Left Side */}
                        <div className="w-full lg:w-1/3 space-y-6">
                            {!image ? (
                                <div 
                                    onClick={() => fileInputRef.current.click()}
                                    className="h-72 border-2 border-dashed border-slate-200 bg-white rounded-2xl flex flex-col items-center justify-center p-8 cursor-pointer hover:border-blue-400 group transition-all"
                                >
                                    <input type="file" ref={fileInputRef} className="hidden" onChange={handleImageUpload} accept="image/*"/>
                                    <div className="w-16 h-16 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                                        <Upload />
                                    </div>
                                    <p className="font-bold text-slate-900">사진 업로드</p>
                                    <p className="text-xs text-slate-400 mt-1 uppercase font-semibold">JPG, PNG (Max 10MB)</p>
                                </div>
                            ) : (
                                <div className="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm space-y-4">
                                    <div className="relative aspect-[4/3] rounded-xl overflow-hidden bg-slate-50 border border-slate-100">
                                        <img src={image} className="w-full h-full object-contain" />
                                        <button onClick={() => setImage(null)} className="absolute top-2 right-2 p-1.5 bg-white shadow rounded-lg text-slate-500 hover:text-red-500">
                                            <RefreshCw size={14} />
                                        </button>
                                    </div>
                                    <button 
                                        onClick={analyzeImage} 
                                        disabled={isAnalyzing}
                                        className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold disabled:opacity-50 flex items-center justify-center gap-2"
                                    >
                                        {isAnalyzing ? <RefreshCw className="animate-spin" size={18}/> : <Layers size={18}/>}
                                        {isAnalyzing ? "분석 중..." : "AI 분석 및 요약"}
                                    </button>
                                </div>
                            )}

                            <div className="bg-white rounded-2xl border border-slate-200 p-5 text-sm">
                                <h3 className="font-bold mb-3 flex items-center gap-2">
                                    <CheckCircle size={14} className="text-blue-500" /> 사용 안내
                                </h3>
                                <ul className="space-y-2 text-slate-500">
                                    <li>• 프린트의 텍스트가 잘 보이게 찍어주세요.</li>
                                    <li>• Gemini AI가 수학, 영어, 탐구 모든 과목을 분석합니다.</li>
                                    <li>• 분석 후 PDF 다운로드로 오답 노트를 만드세요.</li>
                                </ul>
                            </div>
                        </div>

                        {/* Right Side */}
                        <div className="flex-1 bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col min-h-[600px]">
                            <div className="border-b border-slate-100 px-6 py-4 flex items-center justify-between shrink-0">
                                <span className="text-sm font-bold border-b-2 border-slate-900 pb-1">AI 추출 결과</span>
                                {result && (
                                    <button onClick={downloadPDF} className="bg-slate-900 text-white px-4 py-2 rounded-lg text-xs font-bold flex items-center gap-2">
                                        <Download size={14} /> PDF 다운로드
                                    </button>
                                )}
                            </div>

                            <div className="flex-1 p-8 overflow-y-auto custom-scrollbar">
                                {result ? (
                                    <div ref={resultRef} className="space-y-8">
                                        <div>
                                            <h2 className="text-2xl font-bold text-slate-950 mb-2 leading-tight">{result.title}</h2>
                                            <div className="flex items-center gap-2 text-slate-400 text-xs">
                                                <span className="w-1.5 h-1.5 bg-blue-500 rounded-full"></span> 
                                                Generated from study materials
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-1 xl:grid-cols-2 gap-8">
                                            <section>
                                                <h4 className="text-[10px] font-black uppercase tracking-widest text-blue-500 mb-4 font-mono">Core Summary</h4>
                                                <div className="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap">{result.summary}</div>
                                            </section>
                                            <section className="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                                                <h4 className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-4 font-mono">Original Text</h4>
                                                <div className="text-[11px] text-slate-500 font-mono leading-relaxed whitespace-pre-wrap max-h-[300px] overflow-y-auto custom-scrollbar">{result.originalText}</div>
                                            </section>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="h-full flex flex-col items-center justify-center text-slate-300 opacity-50 space-y-4">
                                        <FileText size={48} strokeWidth={1} />
                                        <p className="text-sm font-medium">분석 대기 중입니다</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>

                    {error && (
                        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl text-sm font-bold z-[60] flex items-center gap-2">
                            <AlertCircle size={16} className="text-red-400" /> {error}
                        </div>
                    )}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
